services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gitsanity
      # H-7: password sourced from .env, not hardcoded — see .env.example
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gitsanity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitsanity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # L-5: Separate migration service so a failed migration doesn't trigger an
  # endless restart loop in the backend container.
  migrate:
    build: ./backend
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gitsanity:${POSTGRES_PASSWORD}@db:5432/gitsanity
    depends_on:
      db:
        condition: service_healthy
    command: uv run alembic upgrade head

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gitsanity:${POSTGRES_PASSWORD}@db:5432/gitsanity
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers

  frontend:
    build:
      context: ./frontend
      args:
        DOCKER_BUILD: "true"
        # M-7: NEXT_PUBLIC_* vars are baked at build time — pass as ARG, not runtime env
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
